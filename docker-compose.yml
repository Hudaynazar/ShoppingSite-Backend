version: '3.8'

services:
  arcobaleno-db:
    image: postgres:15-alpine
    container_name: arcobaleno_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: arcobalenodb
    ports:
      - "5432:5432"
    volumes:
      - arcobaleno_data:/var/lib/postgresql/data

volumes:
  arcobaleno_data: